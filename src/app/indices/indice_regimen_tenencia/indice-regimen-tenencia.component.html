<div class="indice-regtene">
  <div id="container-regtene"></div>

  <button class="btn-tematico" (click)="aplicarColoresTematico()">
    Aplicar tematización
  </button>

  <div style="margin-bottom: 15px;">
    <mat-form-field appearance="fill" style="width: 300px;">
      <mat-label>Regimen de tenencia</mat-label>
      <mat-select [(value)]="categoriaSeleccionada" (selectionChange)="filtrarPorCategoria()">
        <mat-option *ngFor="let cat of categorias" [value]="cat">
          {{ cat }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="tabla-wrapper">
    <table class="tabla-regtene">
      <thead>
        <tr>
          <th>{{ tituloPrimeraColumna }}</th>
          <th class="num-col">Parcelas</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let fila of tablaFiltrada">
          <td>
            {{ fila.ubigeo }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.parcela) }}
          </td>
        </tr>
      </tbody>

      <tfoot>
        <tr class="fila-total">
          <td><strong>Total</strong></td>
          <td class="num-col">
            <strong>{{ FormatUtil.formatInteger2Digitos(totalParcelas) }}</strong>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
