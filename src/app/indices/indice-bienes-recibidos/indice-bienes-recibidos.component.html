<div class="indice-bienes-recibidos">
  <div id="container-bienes-recibidos"></div>

  <button class="btn-tematico" (click)="aplicarColoresTematico()">
    Ver temático
  </button>

  <div class="tabla-wrapper">
    <span>Cantidad de productores que recibieron bienes</span>

    <table class="tabla-bienes-recibidos">
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Productores</th>
          <th>Entidad de Apoyo</th>
        </tr>
      </thead>

      <tbody>
        <ng-container *ngFor="let key of tablaKeys">
          <ng-container *ngFor="let item of tablaDatos[key]; let i = index">
            <tr>
              <td
                *ngIf="i === 0"
                [attr.rowspan]="tablaDatos[key].length"
                class="categoria-merged"
              >
                {{ key }}
              </td>

              <td class="num-col">{{ FormatUtil.formatInteger(item.productores) }}</td>
              <td>{{ item.entidadApoyo }}</td>
            </tr>
          </ng-container>
        </ng-container>
      </tbody>

      <tfoot>
        <tr class="fila-total">
          <td><strong>Total</strong></td>
          <td class="num-col">
            <strong>{{ FormatUtil.formatInteger(totalProductores) }}</strong>
          </td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
