<div class="indice-tamparce">
  <!-- Contenedor del gráfico -->
  <div id="container-tamparce"></div>

  <!-- Tabla con los datos -->
  <div class="tabla-wrapper">
    <table class="tabla-tamparce">
      <thead>
        <tr>
          <th>Jurisdicción</th>
          <th>Parcelas</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of tablaDatos">
          <td class="num-col">
            {{ FormatUtil.formatInteger(fila.ubigeo) }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.parcelas) }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
