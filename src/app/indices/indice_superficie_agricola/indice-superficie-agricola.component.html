<div class="indice-supagri">
  <!-- Contenedor del gráfico -->
  <div id="container-supagri"></div>

  <!-- Tabla con los datos -->
  <div class="tabla-wrapper">
    <table class="tabla-supagri">
      <thead>
        <tr>
          <th>Regiones</th>
          <th>Área Total (ha.)</th>
          <th>Área Bajo Riego (ha.)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of tablaDatos">
          <td>{{ fila.ddescr }}</td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.hectareaTotal) }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.hectariaBajoRiego) }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
