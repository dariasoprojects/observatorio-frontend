<div class="indice-fuente">
  <!-- Contenedor del gráfico -->
  <div id="container-fuente"></div>

  <div class="acciones">
    <button class="btn-tema" (click)="aplicarColoresTematico()">
      Aplicar tematización
    </button>
  </div>

  <!-- Tabla con los datos -->
  <div class="tabla-wrapper">
    <table class="tabla-fuente">
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Productores</th>
          <th>Hectárea</th>
          <th>Parcelas</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of tablaDatos">
          <td>
            {{ fila.ddescr }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger(fila.productores) }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.hectarea) }}
          </td>
          <td class="num-col">
            {{ FormatUtil.formatInteger2Digitos(fila.parcelas) }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
