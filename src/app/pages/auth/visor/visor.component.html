<!-- GRID PRINCIPAL -->
<div class="content-grid" [class.left-collapsed]="isCollapsed">
  <!-- IZQUIERDA -->

  <app-sidebar
    #sidebar
    [(isCollapsed)]="isCollapsed"
    [activeSection]="activeSection"
    (sectionSelected)="onSelectSection($event)">
  </app-sidebar>

  <!-- TOP-WIDE -->
  <section class="top-wide">
    <div class="topbar">
      <div class="topbar-right">
        <div class="usr-info">
          <i class="pi pi-search"
             role="button"
             aria-label="Buscar dni"
             title="Buscar dni"
             (click)="dialogVisibleBusquedaDni=true"
             >
          </i>
        </div>
        <p-avatar [label]="inicialUsuario" shape="circle" styleClass="usr-avatar" (click)="menu.toggle($event)"></p-avatar>
        <p-menu #menu [model]="items" [popup]="true" />
        <div class="usr-info">
          <div class="usr-name">{{ usuarioLogueado }}</div>
          <div class="usr-role">{{ tipoUsuario }} - {{ entidadUsuario }}</div>
        </div>

      </div>
    </div>
  </section>

  <!-- CENTRO: MAPA -->
  <main class="center-map">
    <div id="mapContainer" class="map">
      <app-mapa></app-mapa>

    </div>
  </main>



  <!-- DERECHA -->
  <app-side-right
    #sideright
    [activeSection]="activeSection">
  </app-side-right>

  <p-dialog
    header="GeoPerfil"
    [(visible)]="dialogVisible"
    [modal]="false"
    [style]="{ width: '630px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-analisis-espacial
      (close)="dialogVisible = false">
    </app-analisis-espacial>
  </p-dialog>

  <p-dialog
    header="GeoAnalítica"
    [(visible)]="dialogVisibleConsultaMultiple"
    [modal]="false"
    [style]="{ width: '830px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-consulta-multiple></app-consulta-multiple>
  </p-dialog>



 <p-dialog
  header="Descargas"
  [(visible)]="dialogVisibleDescarga"
  [modal]="false"
  [style]="{ width: '830px' }"
  [contentStyle]="{ height: '80vh', overflow: 'hidden' }"
  [draggable]="true"
  [resizable]="false"
>
  <app-descargas></app-descargas>
</p-dialog>


  <p-dialog
    [(visible)]="dialogVisibleBusquedaDni"
    [modal]="false"
    [style]="{ width: '430px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <ng-template pTemplate="header">
      <div class="p-dialog-title">
        Búsqueda por DNI
        <div class="dialog-subtitle ">
          Localización de productores
        </div>
      </div>
    </ng-template>

    <app-busqueda-dni
    >
    </app-busqueda-dni>
  </p-dialog>



</div>

<app-loader></app-loader>
