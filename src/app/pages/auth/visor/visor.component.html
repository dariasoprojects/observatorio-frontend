<!-- GRID PRINCIPAL -->
<div class="content-grid" [class.left-collapsed]="isCollapsed">
  <!-- IZQUIERDA -->

  <app-sidebar
    #sidebar
    [(isCollapsed)]="isCollapsed"
    [activeSection]="activeSection"
    (sectionSelected)="onSelectSection($event)">
  </app-sidebar>

  <!-- TOP-WIDE -->
  <section class="top-wide">
    <app-busqueda-dni
      (buscarDni)="onBuscarDni()"
      (limpiarDni)="onLimpiarDni()"
    >
    </app-busqueda-dni>
  </section>

  <!-- CENTRO: MAPA -->
  <main class="center-map">
    <app-mapa></app-mapa>
  </main>

  

  <!-- DERECHA -->
  <app-side-right
    #sideright
    [activeSection]="activeSection">
  </app-side-right>

  <p-dialog
    header="GeoAnalítica"
    [(visible)]="dialogVisible"
    [modal]="false"
    [style]="{ width: '630px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-analisis-espacial
      (close)="dialogVisible = false">
    </app-analisis-espacial>
  </p-dialog>

  <p-dialog
    header="GeoAnalítica"
    [(visible)]="dialogVisibleConsultaMultiple"
    [modal]="false"
    [style]="{ width: '830px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-consulta-multiple></app-consulta-multiple>
  </p-dialog>
</div>

<app-loader></app-loader>
