<!-- GRID PRINCIPAL -->
<div class="content-grid" [class.left-collapsed]="isCollapsed">
  <!-- IZQUIERDA -->

  <app-sidebar
    [(isCollapsed)]="isCollapsed"
    [activeSection]="activeSection"
    (sectionSelected)="onSelectSection($event)">
  </app-sidebar>


  <!-- TOP-WIDE -->
  <section class="top-wide">
    <div class="topbar">
      <div class="topbar-right">
        <p-avatar label="RA" shape="circle" styleClass="usr-avatar"></p-avatar>

        <div class="usr-info">
          <div class="usr-name">Roberto Aranda</div>
          <div class="usr-role">Analista del Sistema</div>
        </div>

        <button type="button" class="usr-icon-btn" (click)="onLogout()">
          <i class="pi pi-sign-out"></i>
        </button>

      </div>
    </div>
  </section>


  <!-- CENTRO: MAPA -->
  <main class="center-map">
    <div id="mapContainer" class="map"></div>

  </main>

  <!-- DERECHA -->
  <app-side-right
    [activeSection]="activeSection"
  >
  </app-side-right>
</div>
