<p-panel header="Selección geográfica" styleClass="panel-tight" >
  <form [formGroup]="form">

    <small class="muted">Consulta las estadísticas más recientes del sector agrario</small>

    <label>Departamento*</label>
    <p-dropdown
      [options]="departamentos"
      optionLabel="name"
      optionValue="code"
      placeholder="Departamento"
      [filter]="true"
      filterPlaceholder="Buscar departamento"
      [filterBy]="'name'"
      [showClear]="true"
      [appendTo]="'body'"
      panelStyleClass="dep-panel"
      formControlName="departamento"
      (onChange)="onDepartamentoChange($event)"
    >
    </p-dropdown>


    <label>Provincia*</label>
    <p-dropdown
      [options]="provincias"
      optionLabel="name"
      optionValue="code"
      placeholder="Provincia"
      [showClear]="true"
      [filter]="true"
      [appendTo]="'body'"
      panelStyleClass="dep-panel"
      formControlName="provincia"
      (onChange)="onProvinciaChange($event)"
    >
    </p-dropdown>
  </form>



</p-panel>
