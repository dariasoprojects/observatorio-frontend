<aside class="sidebar">
  <div class="sidebar-content">

    <!-- Cabecera fija -->
    <div style="background-color: #a3a3a3;" class="menu-item active indicator-item">
      <div class="menu-item-content">
        <!-- <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="20" x2="12" y2="10"></line>
          <line x1="18" y1="20" x2="18" y2="4"></line>
          <line x1="6"  y1="20" x2="6"  y2="16"></line>
        </svg> -->
        <div class="menu-text">
          <span style="font-weight: bold;" class="menu-title">INDICADORES DEL SECTOR AGRAGRIO</span>
        </div>
      </div>
    </div>

    <!-- Items -->
    <ng-container *ngFor="let it of items; let i = index">
      <div
        (click)="selectSection(it.section)"
        class="menu-item other-option"
        [class.active]="activeSection === it.section"
      >

        <div class="menu-item-content">

          <!-- ICONOS -->
          <ng-container [ngSwitch]="it.icon">

            <!-- empadronamiento -->
            <svg *ngSwitchCase="'empadronamiento'" class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14,2 14,8 20,8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10,9 9,9 8,9"></polyline>
            </svg>

            <!-- avance -->
            <svg *ngSwitchCase="'avance'" class="menu-icon-avance" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"></path>
              <path d="M12 5l7 7-7 7"></path>
            </svg>

            <!-- actividad -->
            <svg *ngSwitchCase="'actividad'" class="menu-icon-actividad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="9" y1="6"  x2="20" y2="6"></line>
              <line x1="9" y1="12" x2="20" y2="12"></line>
              <line x1="9" y1="18" x2="20" y2="18"></line>
              <circle cx="4" cy="6"  r="1"></circle>
              <circle cx="4" cy="12" r="1"></circle>
              <circle cx="4" cy="18" r="1"></circle>
            </svg>

            <!-- educa -->
            <svg *ngSwitchCase="'educa'" class="menu-icon-educa" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path d="M2 10l10-5 10 5-10 5-10-5z"></path>
              <path d="M12 15v5"></path>
              <path d="M12 15l6.16-3.09a2 2 0 0 1 1.84 0L22 13"></path>
            </svg>

            <!-- region -->
            <svg *ngSwitchCase="'region'" class="menu-icon-region" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path d="M3 20l7-12 7 12H3z"></path>
              <path d="M14 20l5-9 5 9h-10z"></path>
            </svg>

            <!-- moneda -->
            <svg *ngSwitchCase="'moneda'" class="menu-icon-moneda" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7v10M9 9c0-1.1 1.3-2 3-2s3 .9 3 2-1.3 2-3 2-3 .9-3 2 1.3 2 3 2 3-.9 3-2"></path>
            </svg>

            <!-- sexo -->
            <svg *ngSwitchCase="'sexo'" class="menu-icon-sexo" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <circle cx="12" cy="12" r="4"></circle>
              <line x1="15" y1="9"  x2="19" y2="5"></line>
              <line x1="19" y1="5"  x2="19" y2="9"></line>
              <line x1="19" y1="5"  x2="15" y2="5"></line>
              <line x1="9"  y1="15" x2="9"  y2="19"></line>
              <line x1="7"  y1="17" x2="11" y2="17"></line>
            </svg>

            <!-- organiza -->
            <svg *ngSwitchCase="'organiza'" class="menu-icon-organiza" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <rect x="10" y="2"  width="4" height="4"></rect>
              <rect x="4"  y="10" width="4" height="4"></rect>
              <rect x="16" y="10" width="4" height="4"></rect>
              <rect x="2"  y="18" width="4" height="4"></rect>
              <rect x="10" y="18" width="4" height="4"></rect>
              <rect x="18" y="18" width="4" height="4"></rect>
              <line x1="12" y1="6"  x2="12" y2="10"></line>
              <line x1="12" y1="10" x2="6"  y2="10"></line>
              <line x1="12" y1="10" x2="18" y2="10"></line>
              <line x1="6"  y1="14" x2="4"  y2="18"></line>
              <line x1="6"  y1="14" x2="12" y2="18"></line>
              <line x1="18" y1="14" x2="20" y2="18"></line>
            </svg>

            <!-- supagri -->
            <svg *ngSwitchCase="'supagri'" class="menu-icon-supagri" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path d="M2 17 C6 13, 10 13, 14 17" />
              <path d="M2 19 C6 15, 10 15, 14 19" />
              <path d="M2 21 C6 17, 10 17, 14 21" />
              <path d="M11.5 11 v4" />
              <path d="M11.5 12.5 C10 11.5, 9 10, 11 9.5" />
              <path d="M11.5 12.5 C13 11.5, 14 10, 12 9.5" />
              <circle cx="19" cy="5" r="2"></circle>
              <line x1="19" y1="2.5" x2="19" y2="1.2"></line>
              <line x1="19" y1="8"   x2="19" y2="9.3"></line>
              <line x1="16.5" y1="5" x2="15.3" y2="5"></line>
              <line x1="21.5" y1="5" x2="22.7" y2="5"></line>
            </svg>

            <!-- supsemb -->
            <svg *ngSwitchCase="'supsemb'" class="menu-icon-supsemb" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path d="M2 19 C6 15, 10 15, 14 19" />
              <path d="M2 21 C6 17, 10 17, 14 21" />
              <line x1="6"  y1="13" x2="6"  y2="16" />
              <path d="M6 14 C5 13, 4.5 12, 6 11.5" />
              <path d="M6 14 C7 13, 7.5 12, 6 11.5" />
              <line x1="10" y1="12" x2="10" y2="15" />
              <path d="M10 13 C9 12, 8.5 11, 10 10.5" />
              <path d="M10 13 C11 12, 11.5 11, 10 10.5" />
              <line x1="14" y1="13" x2="14" y2="16" />
              <path d="M14 14 C13 13, 12.5 12, 14 11.5" />
              <path d="M14 14 C15 13, 15.5 12, 14 11.5" />
            </svg>

            <!-- tamparce -->
            <svg *ngSwitchCase="'tamparce'" class="menu-icon-tamparce" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <rect x="3" y="3" width="18" height="18" rx="1" ry="1" />
              <line x1="3"  y1="9"  x2="21" y2="9" />
              <line x1="3"  y1="15" x2="21" y2="15" />
              <line x1="9"  y1="3"  x2="9"  y2="21" />
              <line x1="15" y1="3"  x2="15" y2="21" />
            </svg>

            <!-- regimen -->
            <svg *ngSwitchCase="'regimen'" class="menu-icon-regimen" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <rect x="1.5" y="3" width="12" height="12" rx="1" ry="1"></rect>
              <line x1="1.5" y1="9" x2="13.5" y2="9"></line>
              <line x1="7.5" y1="3" x2="7.5" y2="15"></line>
              <rect x="15" y="4" width="7" height="9" rx="0.8" ry="0.8"></rect>
              <line x1="16" y1="6" x2="20" y2="6"></line>
              <line x1="16" y1="8" x2="19" y2="8"></line>
              <path d="M18.5 13.5c0 .8-.5 1.5-1.5 2.1-1 .6-1 .9-1 .9s0-.3-1-.9c-1-.6-1.5-1.3-1.5-2.1V11h4z" fill="none"></path>
              <path d="M18.5 13.5c0 .8-.5 1.5-1.5 2.1-1 .6-1 .9-1 .9s0-.3-1-.9c-1-.6-1.5-1.3-1.5-2.1V11h4z" opacity="0.08"></path>
              <path d="M18.5 13.5c0 .8-.5 1.5-1.5 2.1-1 .6-1 .9-1 .9s0-.3-1-.9c-1-.6-1.5-1.3-1.5-2.1V11h4z" fill="none"></path>
              <path d="M17 12.2l-1 1-1.2-1.2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>

            <!-- cultivosprin -->
            <svg *ngSwitchCase="'cultivosprin'" class="menu-icon-cultivosprin" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <line x1="6" y1="14" x2="6" y2="19"></line>
              <path d="M6 15 C5 14, 4.5 13, 6 12.5"></path>
              <path d="M6 15 C7 14, 7.5 13, 6 12.5"></path>
              <line x1="12" y1="12" x2="12" y2="19"></line>
              <path d="M12 13 C11 12, 10.5 11, 12 10.5"></path>
              <path d="M12 13 C13 12, 13.5 11, 12 10.5"></path>
              <line x1="18" y1="15" x2="18" y2="19"></line>
              <path d="M18 16 C17 15, 16.5 14, 18 13.5"></path>
              <path d="M18 16 C19 15, 19.5 14, 18 13.5"></path>
              <line x1="3" y1="19" x2="21" y2="19"></line>
            </svg>

            <!-- cultivostrans -->
            <svg *ngSwitchCase="'cultivostrans'" class="menu-icon" viewBox="0 0 24 24">
              <path d="M12 2 C10 6, 14 10, 12 14 C10 10, 14 6, 12 2"></path>
              <path d="M12 14 C12 18, 10 20, 10 22 H14 C14 20, 12 18, 12 14"></path>
              <line x1="10" y1="22" x2="14" y2="22"></line>
            </svg>

            <!-- cultivosperma -->
            <svg *ngSwitchCase="'cultivosperma'" class="menu-icon-cultivosperma" viewBox="0 0 24 24">
              <path d="M6 10 C5 14, 7 16, 6 20"></path>
              <path d="M6 20 L5.5 22"></path>
              <path d="M12 8 C11 13, 13 16, 12 20"></path>
              <path d="M12 20 L11.5 22"></path>
              <path d="M18 10 C17 14, 19 16, 18 20"></path>
              <path d="M18 20 L17.5 22"></path>
              <line x1="4" y1="22" x2="20" y2="22"></line>
            </svg>

            <!-- fertiabo -->
            <svg *ngSwitchCase="'fertiabo'" class="menu-icon-fertiabo" viewBox="0 0 24 24">
              <path d="M8 5 L16 5 L14 19 L10 19 Z"></path>
              <line x1="10" y1="10" x2="14" y2="10"></line>
              <line x1="10" y1="13" x2="14" y2="13"></line>
              <path d="M12 5 C11 3, 13 3, 12 5"></path>
              <path d="M13 6 C12 4, 14 4, 13 6"></path>
              <line x1="6" y1="19" x2="18" y2="19"></line>
            </svg>

            <!-- bienesreci -->
            <svg *ngSwitchCase="'bienesreci'" class="menu-icon-bienesreci" viewBox="0 0 24 24">
              <rect x="6" y="8" width="12" height="10" rx="1" ry="1"></rect>
              <line x1="6" y1="8" x2="12" y2="4"></line>
              <line x1="12" y1="4" x2="18" y2="8"></line>
              <line x1="12" y1="4" x2="12" y2="8"></line>
              <line x1="4" y1="18" x2="20" y2="18"></line>
            </svg>

            <!-- servreci -->
            <svg *ngSwitchCase="'servreci'" class="menu-icon-servreci" viewBox="0 0 24 24">
              <path d="M6 18 C7 16, 8 12, 12 12 C16 12, 17 16, 18 18"></path>
              <line x1="6" y1="18" x2="18" y2="18"></line>
              <polygon points="12,7 13,10 16,10 13.5,12 14.5,15 12,13 9.5,15 10.5,12 8,10 11,10" fill="none" stroke="currentColor"></polygon>
            </svg>

          </ng-container>

          <!-- Textos -->
          <div class="menu-text">
            <div class="menu-title-row">
              <span class="menu-title">{{ it.title }}</span>
            </div>
            <p class="menu-subtitle"></p>
          </div>

        </div>
      </div>

      <!-- separadores <br> que tenías intercalados -->
      <br *ngIf="breaksAfter.has(i)" />
    </ng-container>
  </div>
</aside>
