<!-- GRID PRINCIPAL -->
<div class="content-grid" [class.left-collapsed]="isCollapsed">
  <!-- IZQUIERDA -->

  <app-sidebar
    #sidebar
    [(isCollapsed)]="isCollapsed"
    [activeSection]="activeSection"
    (sectionSelected)="onSelectSection($event)">
  </app-sidebar>

  <!-- TOP-WIDE -->
  <section class="top-wide">
    <div class="topbar">
      <div class="topbar-right">

        <!-- Ícono genérico o avatar vacío -->
        <p-avatar icon="pi pi-user" shape="circle" styleClass="usr-avatar" (click)="menu.toggle($event)"></p-avatar>
        <p-menu #menu [model]="items" [popup]="true" />

        <div class="usr-info">
          <div class="usr-name">Invitado</div>
          <div class="usr-role">Iniciar sesión</div>
        </div>

        <!-- Botón de login -->
        <button type="button" class="usr-icon-btn" (click)="onLogin()">
          <i class="pi pi-sign-in"></i>
        </button>

      </div>
    </div>
  </section>


  <!-- CENTRO: MAPA -->
  <main class="center-map">
    <div id="mapContainer" class="map">
      <app-mapa></app-mapa>

    </div>
  </main>

  <!-- DERECHA -->
  <app-side-right
    #sideright
    [activeSection]="activeSection"
  >
  </app-side-right>

  <p-dialog
    header="Iniciar Sesión"
    [(visible)]="showLoginDialog"
    [modal]="true"
    [closable]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [resizable]="false"
    [baseZIndex]="10000"
    [style]="{ width: '100vw', height: '100vh', maxWidth: '100vw', margin: '0', top: '0', left: '0', borderRadius: '0' }"
    contentStyle="height: calc(100vh - 60px); overflow-y: auto;"
  >
    <app-login></app-login>
  </p-dialog>

  <p-dialog
    header="GeoPerfil"
    [(visible)]="dialogVisible"
    [modal]="false"
    [style]="{ width: '630px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-analisis-espacial
      (close)="dialogVisible = false"
    ></app-analisis-espacial>
  </p-dialog>

  <p-dialog
    header="GeoAnalítica"
    [(visible)]="dialogVisibleConsultaMultiple"
    [modal]="false"
    [style]="{ width: '830px' }"
    [draggable]="true"
    [resizable]="false"
  >
    <app-consulta-multiple ></app-consulta-multiple>
  </p-dialog>
</div>
<app-loader></app-loader>
