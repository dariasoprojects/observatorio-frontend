<div class="indice-cultivtran">
  <!-- Contenedor del gráfico -->
  <div id="container-cultivtran"></div>

  <!-- Tabla con los datos -->
  <div class="tabla-wrapper">
    <table class="tabla-cultivtran">
      <thead>
        <tr>
          <th>Jurisdicción</th>
          <th>Parcelas</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let fila of tablaDatos">
          <td>{{ fila.ubigeo }}</td>
          <td>{{ fila.parcelas }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
