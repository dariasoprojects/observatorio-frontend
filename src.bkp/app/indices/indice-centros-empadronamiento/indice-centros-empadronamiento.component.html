<div class="indice-centros">

  <div id="container-centros"></div>

  <div class="tabla-wrapper">
    <table class="tabla-centros">
      <thead>
        <tr>
          <th>Centro de Empadronamiento</th>
          <th>Cantidad</th>
          <th>Datos</th>
          <th>Ver en Mapa</th>
          
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categorias; let i = index">
          <td>{{ c }}</td>
          <td class="num-col">
            {{ FormatUtil.formatInteger(valores[i]) }}
          </td>
          
          <!-- <td>
              <button mat-raised-button color="primary" (click)="abrirDialogoExportar(c)">
                Export
              </button>
          </td> -->


          <td>
            <button
              mat-icon-button
              color="primary"
              class="mini-icon"
              matTooltip="Exportar a Excel"
              (click)="abrirDialogoExportar(c)"
            >
              <mat-icon>file_download</mat-icon>
            </button>
          </td>

          <!-- <td>
            <label class="switch">
              <input
                type="checkbox"
                [checked]="activeReg === c"
                (change)="toggleCluster($event, c)"
              />
              <span class="slider"></span>
            </label>
          </td> -->

          <td>

            <mat-slide-toggle
              color="primary"
              [checked]="activeReg === c"
              (change)="toggleCluster($event, c)"
              class="small-toggle"
            ></mat-slide-toggle>
          </td>


          
        </tr>
      </tbody>
    </table>

  </div>
</div>
